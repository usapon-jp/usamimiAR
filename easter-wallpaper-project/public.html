<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>イースターたまご探し</title>
  <link rel="stylesheet" href="styles/site.css">
</head>
<body class="theme-app" data-reset-on-load="true">
  <main class="app-shell public-shell">
    <header class="topbar public-topbar">
      <div>
        <p class="eyebrow">Easter Egg Hunt</p>
        <h1>たまごをタップして うさぎを見つけよう</h1>
        <p class="lead public-lead">見つけたうさぎは保存できます。もう一度遊ぶときは「やり直す」を押してね。</p>
      </div>
      <div class="topbar-actions">
        <button id="resetButton" class="ghost-button" type="button">やり直す</button>
        <button id="saveImageButton" class="primary-button" type="button">保存</button>
      </div>
    </header>

    <section class="scene-card public-card">
      <div class="scene-frame">
        <div id="scene" class="scene" aria-label="たまご探しステージ"></div>
      </div>
      <div class="status-row public-status-row">
        <p id="progressText">読み込み中...</p>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="scripts/layout-config.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
