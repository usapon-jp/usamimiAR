<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>うさみみAR</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>
body { margin: 0; overflow: hidden; background: #000; }
video, canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

.mirror {
  transform: scaleX(-1);
}
#status {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  gap: 16px;
  box-sizing: border-box;
  background: rgba(0, 0, 0, 0.58);
  color: #fff;
  font-family: sans-serif;
  font-size: 16px;
  line-height: 1.6;
  text-align: center;
  z-index: 1000;
  pointer-events: auto;
}

#status.hidden {
  display: none;
}

#startButton {
  position: relative;
  border: 0;
  border-radius: 999px;
  padding: 14px 24px;
  background: #fff;
  color: #111;
  font-size: 16px;
  font-weight: 700;
  z-index: 1001;
  pointer-events: auto;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

#switchButton {
  position: absolute;
  right: 16px;
  bottom: 16px;
  border: 0;
  border-radius: 999px;
  padding: 12px 18px;
  background: rgba(255, 255, 255, 0.92);
  color: #111;
  font-size: 15px;
  font-weight: 700;
  z-index: 1001;
  display: none;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

#switchButton.visible {
  display: block;
}
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<div id="status">
  <div id="statusText">下のボタンを押して、カメラをつかえるようにしてね</div>
  <button id="startButton" type="button">カメラをつける</button>
</div>
<button id="switchButton" type="button">アウトカメ</button>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const status = document.getElementById("status");
const statusText = document.getElementById("statusText");
const startButton = document.getElementById("startButton");
const switchButton = document.getElementById("switchButton");
const earCanvas = document.createElement("canvas");
const earCtx = earCanvas.getContext("2d");
let processedEar = null;
let currentFacingMode = "user";
let currentStream = null;
let animationFrameId = null;
let isSending = false;

const ear = new Image();
ear.src = "usamimi.png";
ear.onload = () => {
  earCanvas.width = ear.naturalWidth;
  earCanvas.height = ear.naturalHeight;
  earCtx.clearRect(0, 0, earCanvas.width, earCanvas.height);
  earCtx.drawImage(ear, 0, 0);

  const imageData = earCtx.getImageData(0, 0, earCanvas.width, earCanvas.height);
  const { data } = imageData;

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    if (r < 20 && g < 20 && b < 20) {
      data[i + 3] = 0;
    }
  }

  earCtx.putImageData(imageData, 0, 0);
  processedEar = earCanvas;
};

function showStatus(message) {
  statusText.textContent = message;
  status.classList.remove("hidden");
}

function hideStatus() {
  status.classList.add("hidden");
}

function updateCameraModeUi() {
  const mirrored = currentFacingMode === "user";
  video.classList.toggle("mirror", mirrored);
  canvas.classList.toggle("mirror", mirrored);
  switchButton.textContent = mirrored ? "アウトカメ" : "インカメ";
}

const faceMesh = new FaceMesh({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});

faceMesh.setOptions({
  maxNumFaces: 1,
  refineLandmarks: true,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

faceMesh.onResults((results) => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

  if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
    const face = results.multiFaceLandmarks[0];
    const leftTemple = face[234];
    const rightTemple = face[454];
    const forehead = face[10];
    const chin = face[152];

    const leftX = leftTemple.x * canvas.width;
    const leftY = leftTemple.y * canvas.height;
    const rightX = rightTemple.x * canvas.width;
    const rightY = rightTemple.y * canvas.height;
    const foreheadX = forehead.x * canvas.width;
    const foreheadY = forehead.y * canvas.height;
    const chinY = chin.y * canvas.height;

    const dx = rightX - leftX;
    const dy = rightY - leftY;
    const headWidth = Math.hypot(dx, dy);
    const headHeight = Math.max(chinY - foreheadY, headWidth * 0.9);
    const angle = Math.atan2(dy, dx);

    const earWidth = headWidth * 2.35;
    const earHeight = earWidth * ((ear.naturalHeight / ear.naturalWidth) || 0.68);
    const centerX = foreheadX;
    const centerY = foreheadY - headHeight * 0.48;

    if (processedEar) {
      ctx.save();
      ctx.translate(centerX, centerY);
      ctx.rotate(angle);
      ctx.drawImage(processedEar, -earWidth / 2, -earHeight / 2, earWidth, earHeight);
      ctx.restore();
    }
  }
});

async function renderLoop() {
  if (video.readyState >= 2 && !isSending) {
    isSending = true;
    try {
      await faceMesh.send({ image: video });
    } finally {
      isSending = false;
    }
  }

  animationFrameId = requestAnimationFrame(renderLoop);
}

async function startCamera(mode = currentFacingMode) {
  startButton.disabled = true;
  switchButton.disabled = true;
  currentFacingMode = mode;
  updateCameraModeUi();
  showStatus("今、カメラのじゅんび中だよ。出てきたまどで「きょか」してね");

  try {
    if (animationFrameId) {
      cancelAnimationFrame(animationFrameId);
      animationFrameId = null;
    }

    if (currentStream) {
      currentStream.getTracks().forEach((track) => track.stop());
      currentStream = null;
    }

    currentStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: mode }, width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });

    video.srcObject = currentStream;
    await video.play();
    hideStatus();
    switchButton.classList.add("visible");
    switchButton.disabled = false;
    animationFrameId = requestAnimationFrame(renderLoop);
  } catch (error) {
    startButton.disabled = false;
    switchButton.disabled = false;
    showStatus("カメラをつけられなかったよ。Chrome か Safari で開いて、カメラをつかえるようにしてから、もう一度押してね");
  }
}

startButton.addEventListener("click", startCamera);
startButton.addEventListener("touchend", (event) => {
  event.preventDefault();
  startCamera();
}, { passive: false });

switchButton.addEventListener("click", async () => {
  const nextMode = currentFacingMode === "user" ? "environment" : "user";
  await startCamera(nextMode);
});

switchButton.addEventListener("touchend", async (event) => {
  event.preventDefault();
  const nextMode = currentFacingMode === "user" ? "environment" : "user";
  await startCamera(nextMode);
}, { passive: false });
</script>

</body>
</html>
